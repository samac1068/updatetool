<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Querytool V2</title>
  <base href="./">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <script src="assets/common.js"></script>
</head>
<body>
  <script>
    /* Used to remove any potential dangerous tag elements from incoming string */
    function evalStr(str) {
      str.replace("<", "");
      str.replace(">", "");
      str.replace("/", "");
    }

    let jstr = "";
    let token = window.location.href.split("=")[1];

    if(token !== undefined)
    {
      evalStr(token);
      jstr = `<app-root token='${token}'></app-root>`;
    } else
      jstr = `<app-root></app-root>`;

    // Display the angular application either in prod or dev mode.
    document.write(jstr);
  </script>
</body>
</html>
